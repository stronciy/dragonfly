name: Deploy to CapRover (dragonfly / workerdragonfly)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: caprover-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mainapp: ${{ steps.filter.outputs.mainapp }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mainapp:
              - '.github/workflows/deploy-caprover.yml'
              - 'src/app/**'
              - 'server.js'
              - 'middleware.ts'
              - 'next.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'endpoints.md'
              - 'src/lib/**'
              - 'src/realtime/**'
              - 'src/services/**'
              - 'prisma/**'

            worker:
              - '.github/workflows/deploy-caprover.yml'
              - 'src/workers/**'
              - 'src/queues/**'
              - 'tsconfig.worker.json'
              - 'package.json'
              - 'package-lock.json'
              - 'src/lib/**'
              - 'src/realtime/**'
              - 'src/services/**'
              - 'prisma/**'

  deploy_dragonfly:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.mainapp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create captain-definition (dragonfly)
        shell: bash
        run: |
          cat > captain-definition <<'JSON'
          {
            "schemaVersion": 2,
            "dockerfileLines": [
              "FROM node:24-alpine AS build",
              "WORKDIR /app",
              "COPY package.json package-lock.json ./",
              "RUN npm ci",
              "COPY . .",
              "RUN npm run prisma:generate",
              "RUN npm run build",
              "",
              "FROM node:24-alpine AS runtime",
              "WORKDIR /app",
              "ENV NODE_ENV=production",
              "COPY --from=build /app/node_modules ./node_modules",
              "COPY --from=build /app/package.json ./package.json",
              "COPY --from=build /app/next.config.ts ./next.config.ts",
              "COPY --from=build /app/server.js ./server.js",
              "COPY --from=build /app/public ./public",
              "COPY --from=build /app/.next ./.next",
              "CMD [\"node\",\"server.js\"]",
              ""
            ]
          }
          JSON

      - name: Create deploy tar (dragonfly)
        shell: bash
        run: tar --exclude='./.git' --exclude='./deploy.tar' -cf deploy.tar captain-definition package.json package-lock.json next.config.ts server.js middleware.ts src prisma public tsconfig.json tsconfig.worker.json tsconfig.test.json next-env.d.ts

      - name: Deploy dragonfly
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: dragonfly
          token: ${{ secrets.CAPROVER_TOKEN_DRAGONFLY }}

  deploy_workerdragonfly:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create captain-definition (workerdragonfly)
        shell: bash
        run: |
          cat > captain-definition <<'JSON'
          {
            "schemaVersion": 2,
            "dockerfileLines": [
              "FROM node:24-alpine AS build",
              "WORKDIR /app",
              "COPY package.json package-lock.json ./",
              "RUN npm ci",
              "COPY . .",
              "RUN npm run prisma:generate",
              "RUN npm run build:worker",
              "",
              "FROM node:24-alpine AS runtime",
              "WORKDIR /app",
              "ENV NODE_ENV=production",
              "COPY --from=build /app/node_modules ./node_modules",
              "COPY --from=build /app/package.json ./package.json",
              "COPY --from=build /app/dist ./dist",
              "CMD [\"npm\",\"run\",\"worker\"]",
              ""
            ]
          }
          JSON

      - name: Create deploy tar (workerdragonfly)
        shell: bash
        run: tar --exclude='./.git' --exclude='./deploy.tar' -cf deploy.tar captain-definition package.json package-lock.json prisma src tsconfig.json tsconfig.worker.json next-env.d.ts

      - name: Deploy workerdragonfly
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: workerdragonfly
          token: ${{ secrets.CAPROVER_TOKEN_WORKERDRAGONFLY }}

name: Deploy to CapRover (dragonfly / workerdragonfly)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: caprover-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mainapp: ${{ steps.filter.outputs.mainapp }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mainapp:
              - '.github/workflows/deploy-caprover.yml'
              - 'trae-backend/src/app/**'
              - 'trae-backend/server.js'
              - 'trae-backend/next.config.ts'
              - 'trae-backend/package.json'
              - 'trae-backend/package-lock.json'
              - 'trae-backend/endpoints.md'
              - 'trae-backend/src/lib/**'
              - 'trae-backend/src/realtime/**'
              - 'trae-backend/src/services/**'
              - 'trae-backend/prisma/**'

            worker:
              - '.github/workflows/deploy-caprover.yml'
              - 'trae-backend/src/workers/**'
              - 'trae-backend/src/queues/**'
              - 'trae-backend/package.json'
              - 'trae-backend/package-lock.json'
              - 'trae-backend/src/lib/**'
              - 'trae-backend/src/realtime/**'
              - 'trae-backend/src/services/**'
              - 'trae-backend/prisma/**'

  deploy_dragonfly:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.mainapp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create captain-definition (dragonfly)
        shell: bash
        run: |
          cat > captain-definition <<'JSON'
          {
            "schemaVersion": 2,
            "dockerfileLines": [
              "FROM node:20-alpine AS build",
              "WORKDIR /app/trae-backend",
              "COPY trae-backend/package.json trae-backend/package-lock.json ./",
              "RUN npm ci",
              "COPY trae-backend ./",
              "RUN npm run prisma:generate",
              "RUN npm run build",
              "",
              "FROM node:20-alpine AS runtime",
              "WORKDIR /app/trae-backend",
              "ENV NODE_ENV=production",
              "COPY --from=build /app/trae-backend/node_modules ./node_modules",
              "COPY --from=build /app/trae-backend/package.json ./package.json",
              "COPY --from=build /app/trae-backend/next.config.ts ./next.config.ts",
              "COPY --from=build /app/trae-backend/server.js ./server.js",
              "COPY --from=build /app/trae-backend/public ./public",
              "COPY --from=build /app/trae-backend/.next ./.next",
              "CMD [\"node\",\"server.js\"]",
              ""
            ]
          }
          JSON

      - name: Create deploy tar (dragonfly)
        shell: bash
        run: tar -cf deploy.tar captain-definition trae-backend

      - name: Deploy dragonfly
        uses: caprover/deploy-from-github@v1
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: dragonfly
          token: ${{ secrets.CAPROVER_TOKEN_DRAGONFLY }}

  deploy_workerdragonfly:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create captain-definition (workerdragonfly)
        shell: bash
        run: |
          cat > captain-definition <<'JSON'
          {
            "schemaVersion": 2,
            "dockerfileLines": [
              "FROM node:20-alpine AS build",
              "WORKDIR /app/trae-backend",
              "COPY trae-backend/package.json trae-backend/package-lock.json ./",
              "RUN npm ci",
              "COPY trae-backend ./",
              "RUN npm run prisma:generate",
              "RUN npm run build:worker",
              "",
              "FROM node:20-alpine AS runtime",
              "WORKDIR /app/trae-backend",
              "ENV NODE_ENV=production",
              "COPY --from=build /app/trae-backend/node_modules ./node_modules",
              "COPY --from=build /app/trae-backend/package.json ./package.json",
              "COPY --from=build /app/trae-backend/dist ./dist",
              "CMD [\"npm\",\"run\",\"worker\"]",
              ""
            ]
          }
          JSON

      - name: Create deploy tar (workerdragonfly)
        shell: bash
        run: tar -cf deploy.tar captain-definition trae-backend

      - name: Deploy workerdragonfly
        uses: caprover/deploy-from-github@v1
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: workerdragonfly
          token: ${{ secrets.CAPROVER_TOKEN_WORKERDRAGONFLY }}
